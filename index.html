<style>
:root {

  --bg-deep: #9dc5bf;
  --bg-base: #AFD4CF;
  --bg-panel: #C9D9D6;
  --bg-card: #F2F6F5;
  --bg-card-hover: #e8efed;
  --bg-overlay: rgba(30,42,40,0.88);
  --border: rgba(94,142,136,0.28);
  --border-active: #5E8E88;

  /* Text — higher contrast */
  --text-primary: #111C1A;
  --text-secondary: #2E3E3C;
  --text-muted: #4B6B66;
  --text-dim: #7AADA6;

  /* Interactions & Accent */
  --accent: #5C9D8D;
  --accent-dim: rgba(92,157,141,0.18);
  --accent-deep: #3F6E67;

  /* ── STATE COLOR SEMANTICS (aviation/nuclear/anesthesia informed) ──
     RED   = active incompatibility / conflict requiring action NOW
     AMBER = caution, verify, attention needed — not urgent
     GREEN = clear, available, no issues
     BLACK = at capacity / offline / unavailable — not dangerous
     BLUE  = informational, unverified, unknown
     PURPLE/TEAL = dedicated therapy present
     GRAY  = inactive, historical, do not use */
  --c-conflict: #C22D4D;        /* RED — incompatible pairs only */
  --c-conflict-dim: rgba(194,45,77,0.12);
  --c-caution: #C8860A;         /* AMBER — caution/verify (darker for contrast) */
  --c-caution-dim: rgba(200,134,10,0.14);
  --c-clear: #1A7A4A;           /* GREEN — available/compatible */
  --c-clear-dim: rgba(26,122,74,0.12);
  --c-capacity: #1E2A28;        /* BLACK — at capacity, full, not dangerous */
  --c-capacity-dim: rgba(30,42,40,0.12);
  --c-info: #3E7FA3;            /* BLUE — informational/unverified */
  --c-info-dim: rgba(62,127,163,0.14);
  --c-dedicated: #5B4E8C;       /* PURPLE — dedicated therapy */
  --c-dedicated-dim: rgba(91,78,140,0.14);
  --c-ivpb: #2E6B8A;            /* IVPB indicator — steel blue */

  /* Legacy aliases for backward compat */
  --c-safe: var(--c-clear);
  --c-safe-dim: var(--c-clear-dim);
  --c-warn: var(--c-caution);
  --c-warn-dim: var(--c-caution-dim);
  --c-danger: var(--c-conflict);
  --c-danger-dim: var(--c-conflict-dim);
  --c-unknown: var(--c-info);
  --c-unknown-dim: var(--c-info-dim);
  --accent-blue: #3E7FA3;
  --accent-blue-dim: rgba(62,127,163,0.15);

  /* Typography */
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'Inter', 'IBM Plex Sans', sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --action-bar: 60px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 450;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
/* ── scrollbars ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

/* ── layout shells ── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar {
  height: 52px; min-height: 52px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  background: var(--accent-deep);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  z-index: 50;
}
.topbar-logo {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 600;
  color: #F2F6F5;
  letter-spacing: 0.05em;
}
.topbar-logo span { color: #8CAFA9; }
.topbar-divider { width: 1px; height: 20px; background: var(--border); }
.topbar-section { font-size: 11px; color: rgba(242,246,245,0.6); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
.topbar-spacer { flex: 1; }
.topbar-time { font-family: var(--font-mono); font-size: 12px; color: rgba(242,246,245,0.7); }

.screen { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Patient List ── */
.patient-list { display: flex; flex-direction: column; height: 100%; }
.pl-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.pl-title { font-size: 15px; font-weight: 600; flex: 1; }
.pl-subtitle { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.pl-body { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }
.pl-row {
  background: #F2F6F5;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex; align-items: center; gap: 12px;
}
.pl-row:hover { border-color: var(--border-active); background: #e8efed; }
.pl-state-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pl-room { font-family: var(--font-mono); font-size: 13px; font-weight: 600; min-width: 56px; }
.pl-info { flex: 1; }
.pl-name { font-size: 14px; font-weight: 500; }
.pl-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.pl-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.pl-badge {
  font-size: 10px; font-family: var(--font-mono);
  padding: 2px 7px; border-radius: 4px;
  border: 1px solid; font-weight: 500;
}
.badge-safe { color: var(--c-safe); border-color: var(--c-safe); background: var(--c-safe-dim); }
.badge-warn { color: var(--c-warn); border-color: var(--c-warn); background: var(--c-warn-dim); }
.badge-danger { color: var(--c-danger); border-color: var(--c-danger); background: var(--c-danger-dim); }
.badge-unknown { color: var(--c-unknown); border-color: var(--c-unknown); background: var(--c-unknown-dim); }
.badge-ded { color: var(--c-dedicated); border-color: var(--c-dedicated); background: var(--c-dedicated-dim); }
.badge-blue { color: var(--accent-blue); border-color: var(--accent-blue); background: var(--accent-blue-dim); }
.badge-gray { color: var(--text-muted); border-color: var(--border); background: var(--bg-panel); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius);
  font-family: var(--font-sans); font-size: 13px; font-weight: 500;
  border: 1px solid; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
  -webkit-user-select: none; user-select: none;
}
.btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
.btn-primary:hover { background: #2563eb; border-color: #2563eb; }
.btn-ghost { background: rgba(255,255,255,0.4); border-color: var(--border-active); color: var(--text-secondary); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text-primary); background: rgba(255,255,255,0.7); }
.btn-danger { background: var(--c-danger-dim); border-color: var(--c-danger); color: var(--c-danger); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-warn { background: var(--c-warn-dim); border-color: var(--c-warn); color: var(--c-warn); }
.btn-qc { background: var(--accent-blue); border-color: var(--c-warn); color: var(--c-warn); }
.btn-qc:hover { background: #2563eb; border-color: var(--c-warn); color: var(--c-warn); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; }
.btn-icon { padding: 8px; width: 36px; height: 36px; border-radius: var(--radius); }

/* ── Workspace — single panel body map ── */
@keyframes slideIn { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes alertPulse { 0%,100% { box-shadow: 0 0 0 3px rgba(194,45,77,0.3), 0 0 0 5px rgba(194,45,77,0.1); } 50% { box-shadow: 0 0 0 4px rgba(194,45,77,0.5), 0 0 0 7px rgba(194,45,77,0.15); } }

/* ── Overlay ── */
.overlay-backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(30,42,40,0.82);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.overlay-panel {
  background: #e8efed;
  border: 1px solid var(--border-active);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.overlay-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.overlay-title { font-size: 15px; font-weight: 600; flex: 1; }
.overlay-body { padding: 16px 20px; flex: 1; overflow-y: auto; }
.overlay-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* search */
.search-input-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%; padding: 10px 14px 10px 36px;
  background: #F2F6F5; border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-primary);
  font-family: var(--font-sans); font-size: 14px;
  outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent-blue); }

.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; }
.search-result-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.search-result-item {
  padding: 9px 12px; border-radius: var(--radius);
  cursor: pointer; border: 1px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.search-result-item:hover { background: #dde8e6; border-color: var(--border-active); }
.search-result-item.selected { background: var(--accent-dim); border-color: var(--accent); }
.search-result-name { font-size: 13px; font-weight: 500; }
.search-result-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.search-result-match { font-size: 10px; color: var(--accent-blue); font-family: var(--font-mono); margin-top: 2px; }

/* placement result */
.placement-result {
  border-radius: var(--radius);
  padding: 12px 14px;
  border: 1px solid;
  margin-top: 12px;
}
.placement-result.safe { background: rgba(33,143,103,0.1); border-color: rgba(33,143,103,0.35); }
.placement-result.warn { background: rgba(209,194,71,0.15); border-color: rgba(209,194,71,0.45); }
.placement-result.danger { background: rgba(194,45,77,0.1); border-color: rgba(194,45,77,0.35); }
.placement-result.unknown { background: rgba(75,144,166,0.1); border-color: rgba(75,144,166,0.3); }
.placement-state-label { font-size: 11px; font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.placement-option { padding: 8px 10px; background: rgba(242,246,245,0.8); border-radius: 6px; margin-bottom: 6px; border: 1px solid var(--border); }
.placement-option-label { font-size: 13px; font-weight: 500; }
.placement-option-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* form fields */
.field-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field-label { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }
.field-input {
  padding: 9px 12px;
  background: #F2F6F5; border: 1px solid var(--border);
  border-radius: var(--border); color: var(--text-primary);
  font-family: var(--font-sans); font-size: 13px;
  outline: none; width: 100%;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: var(--accent-blue); }
.field-select { appearance: none; cursor: pointer; }
.field-row { display: flex; gap: 10px; }
.field-row .field-group { flex: 1; }
.toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
.toggle-btn {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); cursor: pointer;
  transition: all 0.15s; font-family: var(--font-sans);
}
.toggle-btn.active { border-color: var(--accent-blue); background: var(--accent-blue-dim); color: var(--accent-blue); }

/* Quick Check */
.qc-panel { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.qc-title { font-size: 20px; font-weight: 700; }
.qc-subtitle { font-size: 13px; color: var(--text-muted); }
.qc-result {
  border-radius: var(--radius-lg);
  padding: 16px;
  border: 1px solid;
  margin-top: 8px;
}

.audit-drawer {

.audit-drawer.open { transform: translateX(0); }

.rec-reason { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.tag-unknown { color: var(--c-unknown); border-color: var(--c-unknown); background: var(--c-unknown-dim); }
.tag-dedicated { color: var(--c-dedicated); border-color: var(--c-dedicated); background: var(--c-dedicated-dim); }

.nav-back { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-secondary); font-size: 13px; }
.nav-back:hover { color: var(--text-primary); }

  background: rgba(242,246,245,0.7); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.custom-med-header { font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* QC mode */
.qc-overlay {
  position: fixed; inset: 0; z-index: 150;
  background: var(--bg-base);
  display: flex; flex-direction: column;
}
.qc-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: #C9D9D6;
}
.qc-body { flex: 1; overflow-y: auto; padding: 20px; max-width: 640px; margin: 0 auto; width: 100%; }
.qc-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; font-family: var(--font-mono); border: 2px solid; }

/* notification toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--accent-deep); border: 1px solid rgba(255,255,255,0.2); color: #F2F6F5;
  border-radius: var(--radius); padding: 10px 18px;
  font-size: 13px; color: var(--text-primary);

@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }

.longpress-target { cursor: context-menu; }

.ws-lines-header {
  display: flex; align-items: center; justify-content: space-between;

.ack-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

// ─────────────────────────────────────────────
// UTILITY FUNCTIONS
// ─────────────────────────────────────────────
function getMedById(id) {
  return MEDICATIONS.find(m => m.med_id === id) || null;
}

function getPairRule(a, b) {
  return PAIR_RULES.find(r =>
    (r.a === a && r.b === b) || (r.a === b && r.b === a)
  ) || null;
}

// context: 'sameLumen' | 'ySite'
// Unknown behavior per policy: sameLumen -> 'avoid', ySite -> 'caution'
function getCompatibility(medA, medB, context) {
  const rule = getPairRule(medA, medB);
  if (!rule) {
    if (context === 'sameLumen') return POLICY_PROFILE.unknown_same_lumen_behavior || 'avoid';
    if (context === 'ySite') return POLICY_PROFILE.unknown_y_site_behavior || 'caution';
    return 'caution';
  }
  if (context === 'sameLumen') return rule.sl || 'avoid';
  if (context === 'ySite') return rule.ys || 'caution';
  return 'compatible';
}

// Med field accessors — normalise new schema to engine-friendly props
function medRequiresDedicated(med) {
  return med.requires_dedicated_line === true || med.requiresDedicated === true || med.blood_product === true;
}
function medRequiresFilter(med) {
  return med.requires_filter === true || med.filterRequired === true;
}
function medFilterSize(med) {
  const s = med.filter_size || med.filterSize;
  return (!s || s === 'none') ? null : s;
}
function medRequiresCentral(med) {
  const v = med.requires_central !== undefined ? med.requires_central : med.requiresCentral;
  return v === true || v === 'conditional' || v === 'required';
}
function medIsVesicant(med) {
  return med.vesicant === true;
}
function medIsCentral(lineType) {
  return lineType === 'CVC' || lineType === 'PICC' || lineType === 'Arterial';
}
// Two filter meds in same lumen = hard stop (per policy filter_conflict_behavior)
function filterConflict(medA, medB) {
  return medRequiresFilter(medA) && medRequiresFilter(medB);
}

function worstCompat(values) {
  const order = ['incompatible','avoid','caution','unknown','compatible'];
  let worst = 'compatible';
  for (const v of values) {
    if (order.indexOf(v) < order.indexOf(worst)) worst = v;
  }
  return worst;
}

// Search with ranking
function searchMedications(query) {
  if (!query || query.trim().length < 1) return [];
  const q = query.trim().toLowerCase();
  const scored = [];
  for (const med of MEDICATIONS) {
    let score = 0;
    let matchReason = '';
    // exact alias
    if (med.aliases && med.aliases.map(a=>a.toLowerCase()).includes(q)) { score = 100; matchReason = 'alias'; }
    // exact generic
    else if (med.generic_names && med.generic_names.map(a=>a.toLowerCase()).includes(q)) { score = 95; matchReason = 'generic'; }
    // exact brand
    else if (med.brand_names && med.brand_names.map(a=>a.toLowerCase()).includes(q)) { score = 90; matchReason = 'brand'; }
    // exact abbreviation
    else if (med.abbreviations && med.abbreviations.map(a=>a.toLowerCase()).includes(q)) { score = 88; matchReason = 'abbreviation'; }
    // starts-with any
    else if (med.searchable_text && med.searchable_text.toLowerCase().split(' ').some(t => t.startsWith(q))) { score = 70; matchReason = 'starts-with'; }
    // contains
    else if (med.searchable_text && med.searchable_text.toLowerCase().includes(q)) { score = 50; matchReason = 'contains'; }
    if (score > 0) scored.push({ med, score, matchReason });
  }
  return scored.sort((a,b) => b.score - a.score).map(s => ({ ...s.med, _matchReason: s.matchReason }));
}

// State dot color class
function stateColorClass(state) {
  if (state === 'safe') return 'state-safe';
  if (state === 'warn') return 'state-warn';
  if (state === 'danger') return 'state-danger';
  if (state === 'dedicated') return 'state-ded';
  if (state === 'unknown') return 'state-unknown';
  return 'state-gray';
}


function computePatientState(patient) {
  let hasDanger = false, hasWarn = false, hasDedicated = false, hasAvail = false;
  for (const line of patient.activeLines) {
    for (const lumen of line.lumens) {
      if (lumen.primaryStatus === 'available' || lumen.ySiteCapacity > 0) hasAvail = true;
      if (lumen.reservedFor || lumen.primaryStatus === 'dedicated') hasDedicated = true;
      const allMeds = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
      for (let i = 0; i < allMeds.length; i++) {
        for (let j = i+1; j < allMeds.length; j++) {
          const medA = getMedById(allMeds[i].medication);
          const medB = getMedById(allMeds[j].medication);
          if (!medA || !medB) continue;
          const ctx = (allMeds[i].assignmentLevel === 'ysite' || allMeds[j].assignmentLevel === 'ysite') ? 'ySite' : 'sameLumen';
          const c = getCompatibility(allMeds[i].medication, allMeds[j].medication, ctx);
          if (c === 'incompatible') hasDanger = true;
          if (c === 'caution' || c === 'avoid' || c === 'unknown') hasWarn = true;
        }
      }
    }
  }
  // Semiotics: RED = conflict only. BLACK = full. AMBER = caution. GREEN = clear.
  if (hasDanger) return { state: 'conflict', color: 'var(--c-conflict)', label: 'VERIFY NOW', tooltip: 'One or more medications may be incompatible. Tap to review.' };
  if (hasWarn)   return { state: 'caution',  color: 'var(--c-caution)', label: 'REVIEW',     tooltip: 'Combination requires attention or pharmacy verification.' };
  if (hasDedicated && !hasAvail) return { state: 'dedicated', color: 'var(--c-dedicated)', label: 'DEDICATED', tooltip: 'All available lumens carry dedicated-line therapies.' };
  if (hasAvail)  return { state: 'clear',    color: 'var(--c-clear)',   label: 'CAPACITY AVAILABLE', tooltip: 'Open lumens or Y-site capacity available.' };
  return { state: 'at_cap', color: 'var(--c-capacity)', label: 'AT CAPACITY', tooltip: 'All lumens occupied. Y-site may still be available.' };
}

// ─────────────────────────────────────────────
// ASSIGNMENT ENGINE
// ─────────────────────────────────────────────
function runAssignmentEngine(patient, newMed) {
  const medData = getMedById(newMed.med_id) || newMed;
  const alerts = [];
  const recommendations = [];
  const placements = [];

  // Collect all existing meds
  const existingMeds = [];
  for (const line of patient.activeLines) {
    for (const lumen of line.lumens) {
      for (const a of lumen.currentAssignments) existingMeds.push({ ...a, lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label });
      for (const a of lumen.ySiteAssignments) existingMeds.push({ ...a, lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label });
    }
  }

  // Check dedicated requirement
  if (medRequiresDedicated(medData)) {
    alerts.push({ severity: 'high', message: `${medData.display_name} requires a dedicated lumen — no Y-site or co-infusion permitted.` });
  }
  if (medIsVesicant(medData) && POLICY_PROFILE.vasopressor_requires_central !== false) {
    alerts.push({ severity: 'high', message: `${medData.display_name} is a vesicant. Central access required per policy.` });
  }
  if (medRequiresFilter(medData)) {
    alerts.push({ severity: 'info', message: `${medData.display_name} requires ${medFilterSize(medData) || 'in-line'} filter.` });
  }

  // Evaluate each lumen
  for (const line of patient.activeLines) {
    for (const lumen of line.lumens) {
      // Skip dedicated lumens (unless new med is also that dedicated med — not allowed anyway)
      if (lumen.reservedFor && lumen.reservedFor !== newMed.med_id) {
        placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'primary', reason: `Lumen reserved for ${lumen.reservedFor} (dedicated therapy)`, severity: 'blocked' });
        continue;
      }
      if (medRequiresDedicated(medData) && (lumen.currentAssignments.length > 0 || lumen.ySiteAssignments.length > 0)) {
        placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'primary', reason: `${medData.display_name} requires dedicated lumen — lumen occupied`, severity: 'blocked' });
        continue;
      }

      // Central requirement check
      if (medRequiresCentral(medData) && !medIsCentral(line.lineType) && line.lineType === 'PIV') {
        placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'primary', reason: `${medData.display_name} requires central access. Peripheral not recommended.`, severity: 'policy' });
        continue;
      }

      // Primary slot check
      if (lumen.primaryStatus === 'available') {
        // Check compat with existing
        const allInLumen = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
        // Filter conflict: two filter-required meds on same lumen -> hard stop
        const filterConflictExists = allInLumen.some(ex => {
          const exMed = getMedById(ex.medication);
          return exMed && medRequiresFilter(newMed) && medRequiresFilter(exMed);
        });
        if (filterConflictExists) {
          placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'primary', severity: 'blocked', reason: 'Filter conflict — both medications require in-line filters. Separate lumen required.' });
          continue;
        }
        let worstC = 'compatible';
        let worstPair = null;
        for (const ex of allInLumen) {
          const c = getCompatibility(ex.medication, newMed.med_id, 'sameLumen');
          if (['incompatible','avoid','caution','unknown'].includes(c)) {
            if (['incompatible','avoid'].includes(c) || worstC === 'compatible') { worstC = c; worstPair = ex.medication; }
          }
        }
        if (worstC === 'compatible') {
          placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: true, level: 'primary', severity: 'safe', reason: 'Primary lumen available — compatible' });
        } else if (worstC === 'caution' || worstC === 'unknown') {
          placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: true, level: 'primary', severity: worstC, reason: `${worstC === 'unknown' ? 'Compatibility not verified' : 'Caution'} with ${getMedById(worstPair)?.display_name || worstPair}. Verify with pharmacy.` });
        } else {
          placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'primary', severity: 'blocked', reason: `Not recommended — incompatible with ${getMedById(worstPair)?.display_name || worstPair} in same lumen` });
          // Try Y-site
        }
      }

      // Y-site check
      if (lumen.ySiteCapacity > 0 && lumen.ySiteStatus !== 'blocked' && !medRequiresDedicated(medData)) {
        const blockedClasses = ['blood_product','nutrition'];
        // Filter conflict: new med needs filter AND primary lumen med also needs filter -> hard stop
        const ysiteFilterConflict = lumen.currentAssignments.some(ex => {
          const exMed = getMedById(ex.medication); return exMed && medRequiresFilter(medData) && medRequiresFilter(exMed);
        });
        if (ysiteFilterConflict) {
          placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'ysite', severity: 'blocked', reason: 'Filter conflict — both medications require in-line filters. Separate lumen required.' });
        } else if (medData.blood_product || (medData.class && blockedClasses.includes(medData.class))) {
          placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'ysite', severity: 'blocked', reason: medData.display_name + ' cannot run at Y-site — class restriction' });
        } else {
          const allInLumen = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
          let ysiteWorst = 'compatible';
          let ysiteWorstPair = null;
          for (const ex of allInLumen) {
            const c = getCompatibility(ex.medication, newMed.med_id, 'ySite');
            if (['incompatible','avoid','caution','unknown'].includes(c)) {
              if (['incompatible','avoid'].includes(c) || ysiteWorst === 'compatible') { ysiteWorst = c; ysiteWorstPair = ex.medication; }
            }
          }
          if (ysiteWorst === 'compatible') {
            placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: true, level: 'ysite', severity: 'safe', reason: `Y-site compatible. ${lumen.ySiteCapacity} slot(s) available.` });
          } else if (ysiteWorst === 'caution' || ysiteWorst === 'unknown') {
            placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: true, level: 'ysite', severity: ysiteWorst, reason: `Y-site: ${ysiteWorst === 'unknown' ? 'Compatibility not verified' : 'Caution'}. Pharmacy verification recommended.` });
          } else {
            placements.push({ lumenId: lumen.lumenId, lineId: line.lineId, lumenLabel: lumen.label, lineLabel: line.display_label, feasible: false, level: 'ysite', severity: 'blocked', reason: `Y-site not recommended — incompatible with ${getMedById(ysiteWorstPair)?.display_name || ysiteWorstPair}` });
          }
        }
      }
    }
  }

  const safePlacements = placements.filter(p => p.feasible && p.severity === 'safe');
  const cautionPlacements = placements.filter(p => p.feasible && (p.severity === 'caution' || p.severity === 'unknown'));
  const blockedPlacements = placements.filter(p => !p.feasible);

  let overallState;
  if (safePlacements.length > 0) overallState = 'safe_capacity_available';
  else if (cautionPlacements.length > 0) overallState = 'review_reconfigurable';
  else if (blockedPlacements.length > 0 && blockedPlacements.some(p => p.severity === 'policy')) overallState = 'new_access_recommended';
  else overallState = 'unresolvable_escalate';

  if (overallState === 'new_access_recommended' || overallState === 'unresolvable_escalate') {
    recommendations.push({ action: 'New vascular access may be required', reason: `No compatible lumen identified for ${medData.display_name}`, target: 'vascular_access_team' });
  }
  if (cautionPlacements.length > 0 && safePlacements.length === 0) {
    recommendations.push({ action: 'Verify compatibility with pharmacy before proceeding', reason: 'Only uncertain placements identified' });
  }

  return { overallState, safePlacements, cautionPlacements, blockedPlacements, alerts, recommendations };
}

function lineDotColor(line) {
  let hasConflict=false, hasDedicated=false, hasCaution=false, hasAvail=false, atCapacity=false;
  for (const lumen of line.lumens) {
    if (lumen.reservedFor || lumen.primaryStatus==='dedicated') hasDedicated=true;
    if (lumen.primaryStatus==='available') hasAvail=true;
    const allMeds = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
    for (let i=0;i<allMeds.length;i++) for (let j=i+1;j<allMeds.length;j++) {
      const ctx=(allMeds[i].assignmentLevel==='ysite'||allMeds[j].assignmentLevel==='ysite')?'ySite':'sameLumen';
      const c=getCompatibility(allMeds[i].medication,allMeds[j].medication,ctx);
      if (c==='incompatible'||c==='avoid') hasConflict=true;
      else if (c==='caution') hasCaution=true;
      // unknown = blue/info, not amber - don't alarm on unknown
    }
  }
  const allLumens = line.lumens;
  const anyYsite = allLumens.some(l=>l.ySiteCapacity>0);
  const fullyOccupied = !hasAvail && !anyYsite && allLumens.every(l=>l.primaryStatus!=='available');
  if (hasConflict) return '#C22D4D';          // RED: conflict
  if (hasDedicated&&!hasAvail&&!anyYsite) return '#5B4E8C'; // PURPLE: dedicated, full
  if (hasCaution) return '#C8860A';            // AMBER: caution
  if (hasAvail||anyYsite) return '#1A7A4A';    // GREEN: capacity available
  if (fullyOccupied) return '#1E2A28';         // BLACK: at capacity, not dangerous
  return '#3E7FA3';                            // BLUE: informational
}

function lineHasAlerts(line) {
  for (const lumen of line.lumens) {
    const allMeds = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
    for (let i = 0; i < allMeds.length; i++) {
      for (let j = i+1; j < allMeds.length; j++) {
        const ctx = (allMeds[i].assignmentLevel==='ysite'||allMeds[j].assignmentLevel==='ysite') ? 'ySite' : 'sameLumen';
        const c = getCompatibility(allMeds[i].medication, allMeds[j].medication, ctx);
        if (c==='incompatible'||c==='avoid'||c==='caution'||c==='unknown') return true;
      }
    }
    if (line.lineType==='PIV') {
      for (const a of allMeds) {
        if (medIsVesicant(getMedById(a.medication)||a)) return true;
      }
    }
  }
  return false;
}

// Compute alerts for a single line
function computeLineAlerts(line) {
  const alerts = [];
  for (const lumen of line.lumens) {
    const allMeds = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
    for (let i = 0; i < allMeds.length; i++) {
      for (let j = i+1; j < allMeds.length; j++) {
        const a = allMeds[i], b = allMeds[j];
        const ctx = (a.assignmentLevel==='ysite'||b.assignmentLevel==='ysite') ? 'ySite' : 'sameLumen';
        const c = getCompatibility(a.medication, b.medication, ctx);
        const mA = getMedById(a.medication), mB = getMedById(b.medication);
        if (c==='incompatible'||c==='avoid') {
          alerts.push({ sev:'danger', msg:`${mA?.display_name||a.medication} + ${mB?.display_name||b.medication} — not recommended at ${ctx==='ySite'?'Y-site':'same lumen'}.`, action:'Separate lumen required.' });
        } else if (c==='caution') {
          alerts.push({ sev:'warn', msg:`${mA?.display_name||a.medication} + ${mB?.display_name||b.medication} — use with caution.`, action:'Verify with pharmacy.' });
        } else if (c==='unknown') {
          alerts.push({ sev:'unknown', msg:`${mA?.display_name||a.medication} + ${mB?.display_name||b.medication} — compatibility not verified.`, action:'Separate lumen preferred.' });
        }
      }
      if (line.lineType==='PIV') {
        const a = allMeds[i];
        if (medIsVesicant(getMedById(a.medication)||a)) {
          alerts.push({ sev:'danger', msg:`${getMedById(a.medication)?.display_name||a.medication} is a vesicant via PIV.`, action:'Central access recommended.' });
        }
      }
    }
  }
  alerts.sort((a,b) => ({danger:0,warn:1,unknown:2}[a.sev]??3) - ({danger:0,warn:1,unknown:2}[b.sev]??3));
  return alerts;
}

// Move My Meds: given a line being DC'd, redistribute its meds across remaining lines
function computeRedistribution(dcLine, allLines) {
  const remainingLines = allLines.filter(l => l.lineId !== dcLine.lineId);
  const medsToMove = [];
  for (const lumen of dcLine.lumens) {
    for (const a of [...lumen.currentAssignments, ...lumen.ySiteAssignments]) {
      const med = getMedById(a.medication);
      medsToMove.push({ assignment: a, med, lumenLabel: lumen.label });
    }
  }

  const placements = [];
  for (const { assignment, med, lumenLabel } of medsToMove) {
    if (!med) { placements.push({ assignment, med: { display_name: assignment.medication }, lumenLabel, options: [], unresolvable: true }); continue; }
    const options = [];
    for (const line of remainingLines) {
      for (const lumen of line.lumens) {
        if (medRequiresDedicated(med) && (lumen.currentAssignments.length + lumen.ySiteAssignments.length) > 0) continue;
        if (lumen.reservedFor && lumen.reservedFor !== assignment.medication) continue;
        if (medRequiresCentral(med) && !medIsCentral(line.lineType)) { options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: false, level:'primary', reason:'Central access required — PIV not recommended' }); continue; }
        // Check filter conflict
        const allInLumen = [...lumen.currentAssignments, ...lumen.ySiteAssignments];
        const filterBlock = allInLumen.some(ex => { const exm = getMedById(ex.medication); return exm && medRequiresFilter(med) && medRequiresFilter(exm); });
        if (filterBlock) { options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: false, level:'primary', reason:'Filter conflict — separate lumen required' }); continue; }
        // Primary slot
        if (lumen.primaryStatus === 'available') {
          let worst = 'compatible', worstWith = null;
          for (const ex of allInLumen) { const c = getCompatibility(ex.medication, assignment.medication, 'sameLumen'); if (['incompatible','avoid','caution','unknown'].includes(c) && (worst==='compatible'||['incompatible','avoid'].includes(c))) { worst=c; worstWith=getMedById(ex.medication)?.display_name||ex.medication; } }
          if (worst==='compatible') options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: true, level:'primary', reason:'Primary lumen available — compatible', severity:'safe' });
          else if (worst==='caution'||worst==='unknown') options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: true, level:'primary', reason:`${worst==='unknown'?'Compatibility not verified':'Caution'} with ${worstWith}`, severity:worst });
          else options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: false, level:'primary', reason:`Not recommended — incompatible with ${worstWith}` });
        }
        // Y-site
        if (lumen.ySiteCapacity > 0 && lumen.ySiteStatus !== 'blocked' && !medRequiresDedicated(med) && !med.blood_product) {
          const blockedClasses = ['blood_product','nutrition'];
          if (!(med.class && blockedClasses.includes(med.class))) {
            let yworst = 'compatible', yworstWith = null;
            for (const ex of allInLumen) { const c = getCompatibility(ex.medication, assignment.medication, 'ySite'); if (['incompatible','avoid','caution','unknown'].includes(c) && (yworst==='compatible'||['incompatible','avoid'].includes(c))) { yworst=c; yworstWith=getMedById(ex.medication)?.display_name||ex.medication; } }
            if (yworst==='compatible') options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: true, level:'ysite', reason:'Y-site compatible', severity:'safe' });
            else if (yworst==='caution'||yworst==='unknown') options.push({ lineLabel: line.display_label, lumenLabel: lumen.label, lumenId: lumen.lumenId, lineId: line.lineId, feasible: true, level:'ysite', reason:`Y-site: ${yworst==='unknown'?'not verified':'caution'} with ${yworstWith}`, severity:yworst });
          }
        }
      }
    }
    const safe = options.filter(o=>o.feasible && o.severity==='safe');
    const caution = options.filter(o=>o.feasible && (o.severity==='caution'||o.severity==='unknown'));
    placements.push({ assignment, med, lumenLabel, safe, caution, blocked: options.filter(o=>!o.feasible), unresolvable: safe.length===0 && caution.length===0 });
  }
  return { medsToMove: placements, needsNewAccess: placements.some(p=>p.unresolvable) };
}

  const handleMoveMeds = () => {
    const result = computeRedistribution(line, allLines);
    setRedistResult(result);
    setShowMoveMeds(true);
    setAuditLog(addAuditEntry('MOVE_MEDS', `Move My Meds triggered for line: ${line.display_label}`));

            {line.lumens.some(l=>l.reservedFor) && <span style={{ fontSize:10, padding:'2px 7px', borderRadius:10, background:'rgba(63,110,103,0.15)', border:'1px solid #3F6E67', color:'#3F6E67', fontWeight:600 }}>Dedicated</span>}

              </div>

                  {lumen.currentAssignments.map((a,i) => <MedRow key={i} assignment={a} isYsite={false} />)}

              )}
              {lumen.ySiteBlockReason && (
                <div style={{ padding:'4px 12px 8px', fontSize:10, color:'#D1C247', fontStyle:'italic' }}>⚠ {lumen.ySiteBlockReason}</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Action buttons */}
      <div style={{ padding:'12px 14px', borderTop:'1px solid var(--border)', background:'#C9D9D6', display:'flex', gap:8 }}>
        <button onClick={handleMoveMeds} style={{
          flex:1, padding:'10px 12px', borderRadius:8,
          background:'rgba(62,127,163,0.1)', border:'2px solid var(--accent-blue)',
          color:'var(--accent-blue)', fontWeight:700, fontSize:13, cursor:'pointer',
          fontFamily:'var(--font-sans)', display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        }}>
          ⟳ Reassign Meds
        </button>
        <button onClick={handleDC} style={{
          padding:'10px 14px', borderRadius:8,
          background:'rgba(194,45,77,0.08)', border:'1px solid rgba(194,45,77,0.4)',
          color:'#C22D4D', fontWeight:600, fontSize:12, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }}>
          D/C Line
        </button>
      </div>

      {/* Move My Meds modal */}
      {showMoveMeds && redistResult && (
        <div style={{
          position:'absolute', inset:0, background:'rgba(30,42,40,0.6)',
          display:'flex', alignItems:'flex-end', zIndex:40,
        }} onClick={e => e.target===e.currentTarget && setShowMoveMeds(false)}>
          <div style={{ width:'100%', background:'#F2F6F5', borderRadius:'12px 12px 0 0', maxHeight:'80%', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <div style={{ padding:'14px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10, background:'#C9D9D6' }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>Move My Meds — {line.display_label}</div>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>
                  {redistResult.needsNewAccess ? '⚠ New vascular access may be required for some medications' : '✓ All meds have placement options'}
                </div>
              </div>
              <button onClick={() => setShowMoveMeds(false)} style={{ background:'transparent', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:18 }}>×</button>
            </div>
            <div style={{ overflowY:'auto', padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
              {redistResult.medsToMove.map((item, i) => {
                const best = item.safe[0] || item.caution[0];
                const col = item.unresolvable ? '#C22D4D' : item.safe.length>0 ? '#218F67' : '#D1C247';
                return (
                  <div key={i} style={{ background:'white', border:`1px solid ${col}44`, borderLeft:`3px solid ${col}`, borderRadius:8, padding:'10px 12px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                      <div style={{ fontSize:13, fontWeight:600, flex:1 }}>{item.med?.display_name || item.assignment.medication}</div>
                      <span style={{ fontSize:9, fontFamily:'var(--font-mono)', fontWeight:700, color:col }}>
                        {item.unresolvable ? 'NO PLACEMENT' : item.safe.length>0 ? 'SAFE OPTION' : 'CAUTION OPTION'}
                      </span>
                    </div>
                    {item.assignment.dose && <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:6 }}>{item.assignment.dose}{item.assignment.rate ? ` · ${item.assignment.rate}` : ''} · from {item.lumenLabel}</div>}
                    {best ? (
                      <div style={{ padding:'7px 10px', background:`${col}10`, borderRadius:6, fontSize:12 }}>
                        <span style={{ fontWeight:600 }}>{best.lineLabel}</span> · {best.lumenLabel}
                        <span style={{ marginLeft:6, fontSize:10, fontFamily:'var(--font-mono)', color:col, fontWeight:600 }}>[{best.level.toUpperCase()}]</span>
                        <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:3 }}>{best.reason}</div>
                      </div>
                    ) : (
                      <div style={{ padding:'7px 10px', background:'rgba(194,45,77,0.08)', borderRadius:6, fontSize:12, color:'#C22D4D' }}>
                        No compatible placement found. New vascular access recommended.
                      </div>
                    )}
                    {item.caution.length>0 && item.safe.length===0 && (
                      <div style={{ fontSize:10, color:'var(--text-muted)', marginTop:4 }}>Pharmacy verification required before proceeding.</div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{ padding:'10px 14px', borderTop:'1px solid var(--border)', background:'#C9D9D6' }}>
              <div style={{ fontSize:11, color:'var(--text-dim)', fontStyle:'italic' }}>This plan does not replace clinical judgment. Verify all placements before administering.</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MedRow({ assignment, isYsite }) {
  const med = getMedById(assignment.medication);
  const name = med ? med.display_name : assignment.medication;
  const isIVPB = assignment.continuousVsIntermittent==='intermittent' || med?.continuous_or_intermittent==='intermittent';
  const isVes = medIsVesicant(med||assignment);
  const isDed = medRequiresDedicated(med||assignment);
  const needsFilt = medRequiresFilter(med||assignment);
  const needsCent = medRequiresCentral(med||assignment);
  return (
    <div style={{ display:'flex', alignItems:'flex-start', gap:7, padding:'6px 9px', borderRadius:6,
      background: isYsite ? 'rgba(62,127,163,0.08)' : 'rgba(92,157,141,0.08)',
      border:`1px solid ${isYsite ? 'rgba(62,127,163,0.2)' : 'rgba(92,157,141,0.2)'}` }}>
      {/* Mode badge: P/Y + cont/IVPB */}
      <div style={{ display:'flex', flexDirection:'column', gap:2, flexShrink:0, marginTop:1 }}>
        <span style={{ fontSize:9, fontFamily:'var(--font-mono)', fontWeight:700, padding:'2px 4px', borderRadius:3,
          background: isYsite ? 'var(--accent-blue-dim)' : 'var(--accent-dim)',
          color: isYsite ? 'var(--accent-blue)' : 'var(--accent)' }}>{isYsite?'Y':'P'}</span>
        {isIVPB && <span style={{ fontSize:8, fontFamily:'var(--font-mono)', fontWeight:700, padding:'1px 4px', borderRadius:3, background:'var(--c-ivpb-dim)', color:'var(--c-ivpb)', border:'1px solid rgba(46,107,138,0.3)' }} title="Intermittent IV piggyback">IVPB</span>}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', letterSpacing:'-0.01em' }}>{name}</div>
        {(assignment.dose || assignment.rate) && (
          <div style={{ fontSize:11, color:'var(--text-secondary)', marginTop:1 }}>
            {assignment.dose}{assignment.rate ? ` · ${assignment.rate}` : ''}
            {!isIVPB && assignment.continuousVsIntermittent ? ` · ${assignment.continuousVsIntermittent}` : ''}
          </div>
        )}
        {isIVPB && (
          <div style={{ fontSize:10, color:'var(--c-ivpb)', marginTop:2, fontStyle:'italic' }}>
            IVPB via dedicated set → Y-sites to carrier
          </div>
        )}
        <div style={{ display:'flex', gap:3, flexWrap:'wrap', marginTop:4 }}>
          {isVes    && <span title="Vesicant — extravasation risk" style={{ fontSize:9, padding:'2px 6px', borderRadius:3, background:'var(--c-conflict-dim)', border:'1px solid rgba(194,45,77,0.4)', color:'var(--c-conflict)', fontFamily:'var(--font-mono)', fontWeight:700 }}>⚠ VESICANT</span>}
          {needsFilt && <span title={`Requires ${medFilterSize(med||assignment)||'in-line'} filter`} style={{ fontSize:9, padding:'2px 6px', borderRadius:3, background:'var(--c-caution-dim)', border:'1px solid rgba(200,134,10,0.4)', color:'var(--c-caution)', fontFamily:'var(--font-mono)', fontWeight:700 }}>FILTER {medFilterSize(med||assignment)||'req.'}</span>}
          {needsCent && <span title="Central access preferred" style={{ fontSize:9, padding:'2px 6px', borderRadius:3, background:'rgba(63,110,103,0.12)', border:'1px solid rgba(63,110,103,0.4)', color:'var(--accent-deep)', fontFamily:'var(--font-mono)', fontWeight:700 }}>CENTRAL</span>}
          {isDed    && <span title="Dedicated lumen required" style={{ fontSize:9, padding:'2px 6px', borderRadius:3, background:'var(--c-dedicated-dim)', border:'1px solid rgba(91,78,140,0.4)', color:'var(--c-dedicated)', fontFamily:'var(--font-mono)', fontWeight:700 }}>DEDICATED</span>}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// DC PROMPT MODAL
// ─────────────────────────────────────────────
function DCPromptModal({ prompt, setPrompt, onConfirm, allLines }) {
  const { line, step } = prompt;
  const allMeds = line.lumens.flatMap(l => [...l.currentAssignments, ...l.ySiteAssignments]);
  const [checked, setChecked] = useState(new Set()); // meds selected for D/C
  const [redistPreview, setRedistPreview] = useState(null);

  const toggleMed = (medId) => {
    setChecked(prev => {
      const n = new Set(prev);
      n.has(medId) ? n.delete(medId) : n.add(medId);
      return n;
    });
  };
  const toggleAll = () => {
    if (checked.size === allMeds.length) setChecked(new Set());
    else setChecked(new Set(allMeds.map(a => a.medication)));
  };

  // Compute redistribution preview for meds NOT being d/c'd
  const medsToRedist = allMeds.filter(a => !checked.has(a.medication));
  const redistLines = allLines.filter(l => l.lineId !== line.lineId);
  const redistResult = computeRedistribution(line, allLines);

  if (step === 'choice') {
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(30,42,40,0.75)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
        <div style={{ background:'#F2F6F5', borderRadius:14, width:'100%', maxWidth:420, overflow:'hidden', boxShadow:'0 20px 60px rgba(30,42,40,0.3)' }}>
          <div style={{ padding:'16px 20px', background:'#C9D9D6', borderBottom:'1px solid var(--border)' }}>
            <div style={{ fontSize:15, fontWeight:700 }}>D/C {line.display_label}</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>
              {allMeds.length} active infusion{allMeds.length!==1?'s':''} assigned to this line
            </div>
          </div>
          <div style={{ padding:'16px 20px', display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:13, color:'var(--text-secondary)' }}>What should happen to the medications on this line?</div>
            <button onClick={() => {
              // Reassign all — show redistribution result then confirm
              setPrompt(p => ({ ...p, step:'reassignPreview' }));
            }} style={{
              padding:'14px 16px', borderRadius:10, textAlign:'left', cursor:'pointer',
              background:'rgba(62,127,163,0.08)', border:'2px solid var(--accent-blue)',
              fontFamily:'var(--font-sans)',
            }}>
              <div style={{ fontSize:14, fontWeight:700, color:'var(--accent-blue)' }}>⟳ Reassign All Medications</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>Automatically redistribute all meds to available lumens on remaining lines. Review before confirming.</div>
            </button>
            <button onClick={() => setPrompt(p => ({ ...p, step:'selectMeds' }))} style={{
              padding:'14px 16px', borderRadius:10, textAlign:'left', cursor:'pointer',
              background:'rgba(194,45,77,0.06)', border:'2px solid rgba(194,45,77,0.4)',
              fontFamily:'var(--font-sans)',
            }}>
              <div style={{ fontSize:14, fontWeight:700, color:'#C22D4D' }}>✕ Discontinue Medications</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>Choose which meds to discontinue. Remaining meds will be automatically reassigned.</div>
            </button>
          </div>
          <div style={{ padding:'10px 20px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'flex-end' }}>
            <button onClick={() => setPrompt(null)} style={{ padding:'8px 16px', borderRadius:8, background:'transparent', border:'1px solid var(--border)', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:13, color:'var(--text-muted)' }}>Cancel</button>
          </div>
        </div>
      </div>
    );
  }

  if (step === 'reassignPreview') {
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(30,42,40,0.75)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
        <div style={{ background:'#F2F6F5', borderRadius:14, width:'100%', maxWidth:480, maxHeight:'85vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(30,42,40,0.3)' }}>
          <div style={{ padding:'16px 20px', background:'#C9D9D6', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
            <div style={{ fontSize:15, fontWeight:700 }}>Reassign Medications</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>{line.display_label} → remaining lines</div>
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:'14px 20px', display:'flex', flexDirection:'column', gap:8 }}>
            {redistResult.medsToMove.length === 0 && <div style={{ fontSize:13, color:'var(--text-muted)', fontStyle:'italic' }}>No medications to reassign.</div>}
            {redistResult.medsToMove.map((item, i) => {
              const best = item.safe[0] || item.caution[0];
              const col = item.unresolvable ? '#C22D4D' : item.safe.length>0 ? '#218F67' : '#D1C247';
              const statusLabel = item.unresolvable ? 'NEW ACCESS NEEDED' : item.safe.length>0 ? 'SAFE PLACEMENT' : 'CAUTION — VERIFY';
              return (
                <div key={i} style={{ background:'white', borderRadius:9, border:`1px solid ${col}33`, borderLeft:`3px solid ${col}`, padding:'10px 14px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                    <div style={{ fontSize:13, fontWeight:700, flex:1 }}>{item.med?.display_name || item.assignment.medication}</div>
                    <span style={{ fontSize:9, fontFamily:'var(--font-mono)', fontWeight:700, color:col, background:`${col}18`, padding:'2px 7px', borderRadius:10 }}>{statusLabel}</span>
                  </div>
                  {item.assignment.dose && <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:6 }}>{item.assignment.dose}{item.assignment.rate ? ` · ${item.assignment.rate}` : ''}</div>}
                  {best ? (
                    <div style={{ background:`${col}10`, borderRadius:6, padding:'7px 10px', fontSize:12 }}>
                      <span style={{ fontWeight:600 }}>{best.lineLabel}</span>
                      <span style={{ color:'var(--text-muted)' }}> · {best.lumenLabel}</span>
                      <span style={{ marginLeft:8, fontSize:10, fontFamily:'var(--font-mono)', color:col, fontWeight:700 }}>[{best.level.toUpperCase()}]</span>
                      {best.reason !== 'Primary lumen available — compatible' && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:3 }}>{best.reason}</div>}
                    </div>
                  ) : (
                    <div style={{ background:'rgba(194,45,77,0.08)', borderRadius:6, padding:'7px 10px', fontSize:12, color:'#C22D4D' }}>
                      No compatible placement found on existing lines. New vascular access required.
                    </div>
                  )}
                </div>
              );
            })}
            {redistResult.needsNewAccess && (
              <div style={{ padding:'10px 14px', background:'rgba(194,45,77,0.08)', border:'1px solid rgba(194,45,77,0.3)', borderRadius:8, fontSize:12, color:'#C22D4D', fontWeight:600 }}>
                ⚠ One or more medications cannot be placed on existing lines. New vascular access is required before discontinuing this line.
              </div>
            )}
          </div>
          <div style={{ padding:'12px 20px', borderTop:'1px solid var(--border)', background:'#C9D9D6', display:'flex', gap:8, justifyContent:'flex-end', flexShrink:0 }}>
            <button onClick={() => setPrompt(p => ({...p, step:'choice'}))} style={{ padding:'9px 16px', borderRadius:8, background:'transparent', border:'1px solid var(--border)', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:13, color:'var(--text-muted)' }}>← Back</button>
            <button onClick={() => onConfirm({ line, dcMedIds: new Set() })} style={{ padding:'9px 18px', borderRadius:8, background:'var(--accent-blue)', border:'none', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:13, fontWeight:700, color:'white' }}>
              Confirm D/C &amp; Reassign
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (step === 'selectMeds') {
    const medsBeingKept = allMeds.filter(a => !checked.has(a.medication));
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(30,42,40,0.75)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
        <div style={{ background:'#F2F6F5', borderRadius:14, width:'100%', maxWidth:460, maxHeight:'85vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(30,42,40,0.3)' }}>
          <div style={{ padding:'16px 20px', background:'#C9D9D6', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
            <div style={{ fontSize:15, fontWeight:700 }}>Select Medications to Discontinue</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>Unchecked meds will be automatically reassigned</div>
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:'14px 20px', display:'flex', flexDirection:'column', gap:6 }}>
            {/* Select all */}
            <div onClick={toggleAll} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:8, background: checked.size===allMeds.length ? 'rgba(194,45,77,0.1)' : 'rgba(92,157,141,0.08)', border:`1px solid ${checked.size===allMeds.length ? 'rgba(194,45,77,0.4)' : 'var(--border)'}`, cursor:'pointer', userSelect:'none' }}>
              <div style={{ width:18, height:18, borderRadius:4, border:`2px solid ${checked.size===allMeds.length ? '#C22D4D' : 'var(--border-active)'}`, background: checked.size===allMeds.length ? '#C22D4D' : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {checked.size===allMeds.length && <span style={{ color:'white', fontSize:12, fontWeight:700 }}>✓</span>}
                {checked.size>0 && checked.size<allMeds.length && <span style={{ color:'var(--accent)', fontSize:14 }}>−</span>}
              </div>
              <span style={{ fontSize:13, fontWeight:700 }}>SELECT ALL</span>
              <span style={{ fontSize:11, color:'var(--text-muted)', marginLeft:'auto' }}>{allMeds.length} medication{allMeds.length!==1?'s':''}</span>
            </div>
            {allMeds.map((a, i) => {
              const med = getMedById(a.medication);
              const name = med?.display_name || a.medication;
              const isChecked = checked.has(a.medication);
              return (
                <div key={i} onClick={() => toggleMed(a.medication)} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 12px', borderRadius:8, background: isChecked ? 'rgba(194,45,77,0.08)' : 'white', border:`1px solid ${isChecked ? 'rgba(194,45,77,0.35)' : 'var(--border)'}`, cursor:'pointer', userSelect:'none' }}>
                  <div style={{ width:18, height:18, borderRadius:4, border:`2px solid ${isChecked ? '#C22D4D' : 'var(--border-active)'}`, background: isChecked ? '#C22D4D' : 'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1 }}>
                    {isChecked && <span style={{ color:'white', fontSize:11, fontWeight:700 }}>✓</span>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600, color: isChecked ? '#C22D4D' : 'var(--text-primary)' }}>{name}</div>
                    {a.dose && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>{a.dose}{a.rate ? ` · ${a.rate}` : ''} · {a.assignmentLevel==='ysite'?'Y-site':'Primary'} — {line.lumens.find(l=>[...l.currentAssignments,...l.ySiteAssignments].includes(a))?.label}</div>}
                  </div>
                  {isChecked && <span style={{ fontSize:10, color:'#C22D4D', fontFamily:'var(--font-mono)', fontWeight:700, alignSelf:'center' }}>D/C</span>}
                  {!isChecked && <span style={{ fontSize:10, color:'#218F67', fontFamily:'var(--font-mono)', fontWeight:700, alignSelf:'center' }}>KEEP</span>}
                </div>
              );
            })}
            {medsBeingKept.length > 0 && (
              <div style={{ marginTop:8, padding:'10px 14px', background:'rgba(33,143,103,0.08)', border:'1px solid rgba(33,143,103,0.3)', borderRadius:8, fontSize:12, color:'#218F67' }}>
                ✓ {medsBeingKept.length} medication{medsBeingKept.length!==1?'s':''} will be automatically reassigned to available lumens
              </div>
            )}
          </div>
          <div style={{ padding:'12px 20px', borderTop:'1px solid var(--border)', background:'#C9D9D6', display:'flex', gap:8, justifyContent:'flex-end', flexShrink:0 }}>
            <button onClick={() => setPrompt(p => ({...p, step:'choice'}))} style={{ padding:'9px 16px', borderRadius:8, background:'transparent', border:'1px solid var(--border)', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:13, color:'var(--text-muted)' }}>← Back</button>
            <button onClick={() => onConfirm({ line, dcMedIds: checked })} style={{ padding:'9px 18px', borderRadius:8, background:'#C22D4D', border:'none', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:13, fontWeight:700, color:'white' }}>
              Confirm D/C {checked.size > 0 ? `(${checked.size} med${checked.size!==1?'s':''})` : ''}
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}


// ─────────────────────────────────────────────
// MED SUMMARY PANEL — all running meds at a glance
// ─────────────────────────────────────────────
function MedSummaryPanel({ patient, onSelectLine, dismissedAlerts, open, onToggle }) {
  const allAssignments = [];
  for (const line of patient.activeLines) {
    for (const lumen of line.lumens) {
      for (const a of lumen.currentAssignments) {
        allAssignments.push({ ...a, line, lumen, isYsite:false });
      }
      for (const a of lumen.ySiteAssignments) {
        allAssignments.push({ ...a, line, lumen, isYsite:true });
      }
    }
  }

  // Group by class for visual organization
  const grouped = {};
  for (const item of allAssignments) {
    const med = getMedById(item.medication);
    const cls = med?.class || 'other';
    if (!grouped[cls]) grouped[cls] = [];
    grouped[cls].push({ ...item, med });
  }

  const CLASS_LABELS = {
    vasopressor:'Vasopressors', sedative:'Sedation', opioid:'Analgesics',
    antibiotic:'Antibiotics', anticoagulant:'Anticoagulants', nutrition:'Nutrition',
    blood_product:'Blood Products', electrolyte:'Electrolytes', fluid:'Fluids',
    benzodiazepine:'Sedation', antiarrhythmic:'Antiarrhythmics', endocrine:'Endocrine',
    diuretic:'Diuretics', other:'Other',
  };
  // Priority order for display
  const CLASS_ORDER = ['vasopressor','sedative','opioid','benzodiazepine','anticoagulant','antiarrhythmic','antibiotic','endocrine','diuretic','electrolyte','nutrition','blood_product','fluid','other'];

  const sortedClasses = Object.keys(grouped).sort((a,b) => {
    const ai = CLASS_ORDER.indexOf(a); const bi = CLASS_ORDER.indexOf(b);
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });

  return (
    <div style={{
      background:'#F2F6F5', borderTop:'2px solid var(--accent-deep)',
      flexShrink:0, overflow:'hidden',
      transition:'max-height 0.25s ease',
      maxHeight: open ? 260 : 0,
    }}>
      <div style={{ overflowY:'auto', maxHeight:260, padding:'10px 16px' }}>
        {allAssignments.length === 0 ? (
          <div style={{ fontSize:13, color:'var(--text-dim)', fontStyle:'italic', padding:'8px 0' }}>No active infusions</div>
        ) : (
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {sortedClasses.map(cls => (
              <div key={cls} style={{ display:'flex', flexDirection:'column', gap:3, minWidth:140 }}>
                <div style={{ fontSize:9, fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--text-dim)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:2 }}>
                  {CLASS_LABELS[cls]||cls}
                </div>
                {grouped[cls].map((item, i) => {
                  const med = item.med;
                  const isIVPB = item.continuousVsIntermittent==='intermittent' || med?.continuous_or_intermittent==='intermittent';
                  const isVes = medIsVesicant(med||item);
                  const isDed = medRequiresDedicated(med||item);
                  const needsFilter = medRequiresFilter(med||item);
                  // Check for conflict with other meds on same lumen
                  const lumenMeds = [...item.lumen.currentAssignments, ...item.lumen.ySiteAssignments];
                  let hasConflict = false, hasCaution = false;
                  for (const other of lumenMeds) {
                    if (other.medication === item.medication) continue;
                    const ctx = item.isYsite ? 'ySite' : 'sameLumen';
                    const c = getCompatibility(item.medication, other.medication, ctx);
                    if (c==='incompatible'||c==='avoid') hasConflict=true;
                    else if (c==='caution') hasCaution=true;
                  }
                  return (
                    <div key={i}
                      onClick={() => onSelectLine(item.line)}
                      style={{
                        display:'flex', alignItems:'center', gap:5,
                        padding:'4px 8px', borderRadius:6, cursor:'pointer',
                        background: hasConflict ? 'rgba(194,45,77,0.1)' : hasCaution ? 'rgba(200,134,10,0.1)' : 'rgba(92,157,141,0.08)',
                        border: `1px solid ${hasConflict?'rgba(194,45,77,0.35)':hasCaution?'rgba(200,134,10,0.3)':'rgba(92,157,141,0.2)'}`,
                        transition:'background 0.1s',
                      }}
                      onMouseOver={e => e.currentTarget.style.background = hasConflict?'rgba(194,45,77,0.18)':hasCaution?'rgba(200,134,10,0.18)':'rgba(92,157,141,0.18)'}
                      onMouseOut={e => e.currentTarget.style.background = hasConflict?'rgba(194,45,77,0.1)':hasCaution?'rgba(200,134,10,0.1)':'rgba(92,157,141,0.08)'}
                    >
                      {/* Status dot */}
                      <div style={{ width:7, height:7, borderRadius:'50%', flexShrink:0,
                        background: hasConflict?'#C22D4D':hasCaution?'#C8860A':'#1A7A4A' }} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                          {med?.display_name || item.medication}
                        </div>
                        <div style={{ fontSize:10, color:'var(--text-muted)' }}>
                          {item.line.display_label} · {item.lumen.label}
                          {item.isYsite && ' · Y'}
                        </div>
                      </div>
                      {/* Semiotic tags */}
                      <div style={{ display:'flex', gap:2, flexShrink:0 }}>
                        {isIVPB && <span title="Intermittent / IVPB" style={{ fontSize:8, padding:'1px 4px', borderRadius:3, background:'var(--c-ivpb-dim)', color:'var(--c-ivpb)', fontFamily:'var(--font-mono)', fontWeight:700, border:'1px solid rgba(46,107,138,0.3)' }}>IVPB</span>}
                        {isVes  && <span title="Vesicant" style={{ fontSize:8, padding:'1px 4px', borderRadius:3, background:'var(--c-conflict-dim)', color:'var(--c-conflict)', fontFamily:'var(--font-mono)', fontWeight:700, border:'1px solid rgba(194,45,77,0.3)' }}>V</span>}
                        {isDed  && <span title="Dedicated lumen required" style={{ fontSize:8, padding:'1px 4px', borderRadius:3, background:'var(--c-dedicated-dim)', color:'var(--c-dedicated)', fontFamily:'var(--font-mono)', fontWeight:700, border:'1px solid rgba(91,78,140,0.3)' }}>D</span>}
                        {needsFilter && <span title="Filter required" style={{ fontSize:8, padding:'1px 4px', borderRadius:3, background:'var(--c-caution-dim)', color:'var(--c-caution)', fontFamily:'var(--font-mono)', fontWeight:700, border:'1px solid rgba(200,134,10,0.3)' }}>F</span>}
                        {hasConflict && <span title="Verify — incompatible pairing" style={{ fontSize:8, padding:'1px 4px', borderRadius:3, background:'var(--c-conflict-dim)', color:'var(--c-conflict)', fontFamily:'var(--font-mono)', fontWeight:700 }}>!</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// State indicator pill — clickable, shows OMO explanation
function StateIndicator({ state, color, label, tooltip, onClick }) {
  const [showTip, setShowTip] = useState(false);
  const ICONS = { conflict:'⬤', caution:'▲', clear:'●', dedicated:'◈', at_cap:'◉', caution_info:'ℹ' };
  return (
    <div style={{ position:'relative', display:'inline-flex', alignItems:'center' }}>
      <button
        onClick={() => { setShowTip(t=>!t); if(onClick) onClick(); }}
        style={{
          display:'inline-flex', alignItems:'center', gap:5,
          padding:'4px 11px', borderRadius:6, cursor:'pointer',
          background:`${color}18`, border:`1.5px solid ${color}55`,
          color, fontWeight:700, fontSize:11, fontFamily:'var(--font-mono)',
          letterSpacing:'0.04em',
        }}
        title={tooltip}
      >
        <span style={{ fontSize:8 }}>{ICONS[state]||'●'}</span>
        {label}
        <span style={{ fontSize:10, opacity:0.7 }}>?</span>
      </button>
      {showTip && (
        <div style={{
          position:'absolute', top:'calc(100% + 6px)', right:0, zIndex:100,
          background:'#1E2A28', color:'#F2F6F5', borderRadius:8, padding:'10px 14px',
          fontSize:12, lineHeight:1.5, maxWidth:260, boxShadow:'0 4px 20px rgba(0,0,0,0.3)',
        }}
          onClick={() => setShowTip(false)}
        >
          <div style={{ fontWeight:700, marginBottom:4 }}>{label}</div>
          <div style={{ color:'rgba(242,246,245,0.8)' }}>{tooltip || 'No additional information.'}</div>
          <div style={{ fontSize:10, color:'rgba(242,246,245,0.4)', marginTop:6 }}>Tap to dismiss</div>
        </div>
      )}
    </div>
  );
}

// Auto-save draft store (session-level)
const DRAFT_STORE = {};
function saveDraft(key, data) { DRAFT_STORE[key] = { data, savedAt: new Date().toLocaleTimeString() }; }
function loadDraft(key) { return DRAFT_STORE[key] || null; }
function clearDraft(key) { delete DRAFT_STORE[key]; }
function listDrafts() { return Object.entries(DRAFT_STORE).map(([k,v])=>({key:k,...v})); }

function PatientWorkspace({ patient: initPatient, onBack, auditLog, setAuditLog }) {
  const [patient, setPatient] = useState(initPatient);
  const [selectedLine, setSelectedLine] = useState(null);
  const [showAddMed, setShowAddMed] = useState(false);
  const [showAddLine, setShowAddLine] = useState(false);
  const [addLinePrefill, setAddLinePrefill] = useState(null);
  const [showAudit, setShowAudit] = useState(false);
  const [toast, setToast] = useState(null);
  const [dismissedAlerts, setDismissedAlerts] = useState(new Set());
  const [dcPrompt, setDcPrompt] = useState(null);
  const [showMedSummary, setShowMedSummary] = useState(false);
  const [drafts, setDrafts] = useState([]);
  const doubleTapRef = useRef({});

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const handleDotClick = (line) => setSelectedLine(line);

  // Double-tap to add line — works on both mouse and touch
  const handleBodyTap = (site) => {
    const key = site.insertion_site || 'body';
    const now = Date.now();
    if (doubleTapRef.current[key] && now - doubleTapRef.current[key] < 400) {
      doubleTapRef.current[key] = 0;
      setAddLinePrefill(site);
      setShowAddLine(true);
      setAuditLog(addAuditEntry('UI', `New line modal: ${site.insertion_site?.replace(/_/g,' ')}`));
    } else {
      doubleTapRef.current[key] = now;
    }
  };

  const handleAddLine = (newLine) => {
    setPatient(p => ({ ...p, activeLines: [...p.activeLines, newLine] }));
    showToast('Line added');
  };

  // Add med: actually assign to first available lumen
  const handleAddMed = ({ medication, dose, rate, continuousVsIntermittent, targetLumen }) => {
    const med = medication;
    const assignment = {
      medication: med.med_id || med.custom_med_id || 'custom',
      dose: dose || '',
      rate: rate || '',
      continuousVsIntermittent: continuousVsIntermittent || med.continuous_or_intermittent || 'continuous',
      priority: 1,
      requiresCentral: medRequiresCentral(med),
      requiresDedicated: medRequiresDedicated(med),
      vesicant: medIsVesicant(med),
      filterRequired: medRequiresFilter(med),
      filterSize: medFilterSize(med),
      compatibilityProfile: med.med_id || 'custom',
      assignmentLevel: 'primary',
    };
    setPatient(p => {
      const lines = p.activeLines.map(line => ({
        ...line,
        lumens: line.lumens.map(lumen => {
          // Use targetLumen if specified, else first available primary slot
          if (targetLumen && lumen.lumenId !== targetLumen) return lumen;
          if (!targetLumen && lumen.primaryStatus !== 'available') return lumen;
          // Add as primary if available, Y-site if primary occupied and capacity exists
          if (lumen.primaryStatus === 'available') {
            return { ...lumen, primaryStatus:'occupied', currentAssignments:[...lumen.currentAssignments, assignment] };
          }
          if (!targetLumen) return lumen; // keep looking
          if (lumen.ySiteCapacity > 0 && lumen.ySiteStatus !== 'blocked') {
            return { ...lumen, ySiteCapacity: lumen.ySiteCapacity-1, ySiteAssignments:[...lumen.ySiteAssignments, {...assignment, assignmentLevel:'ysite'}] };
          }
          return lumen;
        })
      }));
      return { ...p, activeLines: lines };
    });
    showToast(`${med.display_name} added`);
    setAuditLog(addAuditEntry('MED_ADD', `${med.display_name} assigned${dose?' — '+dose:''}`));
  };

  // D/C line — if meds present, prompt for choice
  const handleDCLine = (line) => {
    const allMeds = line.lumens.flatMap(l => [...l.currentAssignments, ...l.ySiteAssignments]);
    if (allMeds.length === 0) {
      setPatient(p => ({ ...p, activeLines: p.activeLines.filter(l => l.lineId !== line.lineId) }));
      showToast(`${line.display_label} discontinued`);
      setAuditLog(addAuditEntry('DC_LINE', `D/C: ${line.display_label} (no meds)`));
    } else {
      setDcPrompt({ line, step:'choice', checked: new Set() });
    }
  };

  const handleDcConfirm = ({ line, dcMedIds }) => {
    // Remove the line
    setPatient(p => {
      let lines = p.activeLines.filter(l => l.lineId !== line.lineId);
      // For meds NOT being d/c'd, try to auto-redistribute onto remaining lines
      const medsToMove = line.lumens.flatMap(l => [...l.currentAssignments,...l.ySiteAssignments])
        .filter(a => !dcMedIds.has(a.medication));
      for (const assignment of medsToMove) {
        // Find first available lumen on remaining lines
        let placed = false;
        lines = lines.map(rl => {
          if (placed) return rl;
          return {
            ...rl,
            lumens: rl.lumens.map(lu => {
              if (placed) return lu;
              if (lu.primaryStatus === 'available') {
                placed = true;
                return { ...lu, primaryStatus:'occupied', currentAssignments:[...lu.currentAssignments, {...assignment, assignmentLevel:'primary'}] };
              }
              if (lu.ySiteCapacity > 0 && lu.ySiteStatus !== 'blocked') {
                placed = true;
                return { ...lu, ySiteCapacity:lu.ySiteCapacity-1, ySiteAssignments:[...lu.ySiteAssignments, {...assignment, assignmentLevel:'ysite'}] };
              }
              return lu;
            })
          };
        });
      }
      return { ...p, activeLines: lines };
    });
    setDcPrompt(null);
    setSelectedLine(null);
    showToast(`${line.display_label} discontinued`);
    setAuditLog(addAuditEntry('DC_LINE', `D/C: ${line.display_label}, D/C meds: ${dcMedIds.size}, redistributed: ${line.lumens.flatMap(l=>[...l.currentAssignments,...l.ySiteAssignments]).filter(a=>!dcMedIds.has(a.medication)).length}`));
  };

  const handleDismissAlert = (key) => {
    setDismissedAlerts(prev => new Set([...prev, key]));
    setAuditLog(addAuditEntry('DISMISS_ALERT', `Alert dismissed: ${key}`));
  };

  const patState = computePatientState(patient);
  const totalLumens = patient.activeLines.reduce((s,l) => s+l.lumens.length, 0);
  const availLumens = patient.activeLines.reduce((s,l) => s+l.lumens.filter(lu=>lu.primaryStatus==='available').length, 0);
  const ysiteSlots  = patient.activeLines.reduce((s,l) => s+l.lumens.reduce((ss,lu)=>ss+(lu.ySiteCapacity||0),0), 0);

  // Capacity displayed in summary bar lumen pills

        {/* Row 1: patient identity + state */}
        <div style={{ padding:'8px 16px', display:'flex', alignItems:'center', gap:12 }}>
          <button className="nav-back" onClick={onBack}>← Patients</button>
          <div style={{ width:1, height:20, background:'var(--border)' }} />
          <div>
            <div style={{ fontSize:15, fontWeight:700, lineHeight:1.2 }}>{patient.name}</div>
            <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{patient.location} · {patient.service}</div>
          </div>
          <div style={{ flex:1 }} />
          <StateIndicator state={patState.state} color={patState.color} label={patState.label} tooltip={patState.tooltip} />
          <button
            onClick={() => setShowMedSummary(s=>!s)}
            style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 12px', borderRadius:8,
              background: showMedSummary ? 'var(--accent-deep)' : 'rgba(63,110,103,0.12)',
              border:'1.5px solid var(--accent-deep)', color: showMedSummary ? '#F2F6F5' : 'var(--accent-deep)',
              cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12, fontWeight:700 }}
          >
            {showMedSummary ? '▾' : '▸'} All Meds ({patient.activeLines.reduce((s,l)=>s+l.lumens.reduce((ss,lu)=>ss+lu.currentAssignments.length+lu.ySiteAssignments.length,0),0)})
          </button>
        </div>
        {/* Row 2: capacity strip — each lumen as a named pill */}
        <div style={{ padding:'0 16px 8px', display:'flex', gap:5, flexWrap:'wrap' }}>
          {patient.activeLines.flatMap(line =>
            line.lumens.map(lumen => {
              const isAvail = lumen.primaryStatus==='available';
              const hasYsite = lumen.ySiteCapacity>0 && lumen.ySiteStatus!=='blocked';
              const isDed = lumen.primaryStatus==='dedicated'||lumen.reservedFor;
              const isFull = !isAvail && lumen.ySiteCapacity===0;
              let bg, border, col, icon;
              if (isFull && !isDed) { bg='rgba(30,42,40,0.12)'; border='rgba(30,42,40,0.35)'; col='#1E2A28'; icon='●'; }
              else if (isDed) { bg='rgba(91,78,140,0.12)'; border='rgba(91,78,140,0.4)'; col='#5B4E8C'; icon='◈'; }
              else if (isAvail) { bg='rgba(26,122,74,0.12)'; border='rgba(26,122,74,0.4)'; col='#1A7A4A'; icon='○'; }

              const cy = coord.y * SVG_H / 100;

                <circle key={site} cx={cx} cy={cy} r={22} fill="transparent"
                  style={{ cursor:'crosshair', touchAction:'manipulation' }}
                  onClick={() => handleBodyTap({ insertion_site:site, ...coord })}
                  onTouchEnd={e => { e.preventDefault(); handleBodyTap({ insertion_site:site, ...coord }); }}
                />
              );
